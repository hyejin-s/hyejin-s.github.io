<!-- Header -->
<header>
  <div class="container">
    <div class="row">
      <div class="col-lg-12">
        <img class="img-responsive" src="img/hyejin-profile.jpg" alt="profile-pic" />
        <div class="intro-text">
          <span class="name">{{ site.title }}</span>
          <hr class="star-light" />
          <div class="cv">
            <p style="font-size: 25px;">{{ site.cv }}</p>
          </div>
          <div class="col-lg-12">
            <h3>{{ site.header.social }}</h3>
            <ul class="list-inline">
                {% for network in site.social %}
                <li>
                    <a href="{{ network.url }}" class="btn-social btn-outline"><i class="fa fa-fw fa-{{ network.title }}"></i></a>
                </li>
            {% endfor %}
            </ul>
          </div>
          <div class="skills">{{ site.skills }}</div>
          <div class="skills">{{ site.skills2 }}</div>
        </div>
      </div>
    </div>
  </div>
</header>
